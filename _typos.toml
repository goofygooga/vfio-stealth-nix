[default.extend-words]
# ACI = ASUS Computer International (3-letter EDID manufacturer code)
ACI = "ACI"
aci = "aci"
# HDA = High Definition Audio (Intel/AMD audio controller)
HDA = "HDA"
# MCH = Memory Controller Hub (Intel Q35 chipset component)
MCH = "MCH"
# "ths" appears in "10ths" (tenths)
ths = "ths"

[default.extend-identifiers]
# BARs = PCI Base Address Registers; typos splits it into "BA" + "Rs" and
# false-flags "BA" as BY/BE.
BARs = "BARs"
